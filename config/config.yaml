system:
  project: "AlgoSensei"
  seed: 42

dsa_patterns:
  - arrays_hashing
  - two_pointers
  - sliding_window
  - stack
  - binary_search
  - linked_list
  - trees
  - tries
  - heap_priority_queue
  - backtracking
  - graphs
  - dynamic_programming_1d
  - dynamic_programming_2d
  - greedy

hint_types:
  - constraint_nudge
  - analogy_hint
  - subproblem_decompose
  - complexity_clue
  - pattern_name_reveal

simulator:
  mastery_threshold: 0.85
  abandon_threshold: 3
  knowledge_decay: 0.05
  noise: 0.10

bandit:
  ucb_c: 1.41
  min_pulls: 3
  n_episodes: 10000
  reward:
    progress: 1.0
    solved: 2.0
    re_hint: -0.5
    abandon: -1.5

ppo:
  state_dim: 16
  action_dim: 42        # 14 patterns × 3 difficulty deltas
  hidden: [128, 64]
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  entropy_coef: 0.01
  value_coef: 0.25   # reduced to control value loss scale
  grad_norm: 0.5
  n_episodes: 3000
  max_steps: 15
  buffer_size: 1024
  update_epochs: 4
  batch_size: 64
  reward:
    mastered: 5.0
    hint_reduction: 1.0
    retention: 2.0
    wrong_direction: -3.0

evaluation:
  n_seeds: 5
  n_eval_episodes: 200
  baseline_seeds: [0,1,2,3,4]